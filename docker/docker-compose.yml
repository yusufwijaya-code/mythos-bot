version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mythos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mythos_db_pass}
      MYSQL_DATABASE: bot_trading_mythos
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mythos-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../config/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    ports:
      - "8000:8000"
    volumes:
      - ../logs:/app/logs

volumes:
  mysql_data:
